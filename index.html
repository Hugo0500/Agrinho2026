<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Desmatamento Educativo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🌳 Simulador de Desmatamento Educativo</h1>
  
  <canvas id="forestCanvas" width="400" height="400"></canvas>
  
  <div class="controls">
    <label>Taxa de desmatamento (%): 
      <input type="number" id="rate" value="10" min="1" max="100">
    </label>
    <button onclick="simulateStep()">Desmatar</button>
    <button onclick="reforest()">Reflorestar</button>
  </div>
  
  <p id="status"></p>
  <p id="climate"></p>
  <p id="alert" class="alert"></p>
  <p id="education" class="education"></p>
  
  <canvas id="chartCanvas" width="400" height="200"></canvas>
  
  <!-- Sons -->
  <audio id="fireSound" src="fire.mp3"></audio>
  <audio id="natureSound" src="birds.mp3" autoplay loop></audio>
  
  <script src="script.js"></script>
</body>
</html>
